name: CI Pipeline - Airport App

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Clonar el repositorio
        uses: actions/checkout@v4

      - name: 2. Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 3. Instalar dependencias
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 4. Verficiación de estilo y formateo con Black y ruff
        run: |
          source .venv/bin/activate
          black --check .
          ruff check .

      - name: 5. Ejecutar prubas con pytest
        run: |
          source .venv/bin/activate
          pytest

      - name: 6. Verificar Secreto
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then echo "EL SECRETO ESTÁ VACÍO"; else echo "EL SECRETO TIENE VALOR"; fi

      - name: 7. Reiniciar DB, Sincronizar y Cargar Datos
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          source .venv/bin/activate

          echo "Sincronizando esquema con la base de datos..."
          # Forzamos a que se marquen y ejecuten las migraciones
          alembic upgrade head

          echo "Iniciando Seeder..."
          python -m app.database.seeder
